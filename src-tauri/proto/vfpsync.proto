syntax = "proto3";
package vfpsync.v1;

service VfpSyncService {
  rpc SyncDocumentos(SyncDocumentosRequest) returns (SyncResponse);
  rpc SyncMovimientos(SyncMovimientosRequest) returns (SyncResponse);
  rpc SyncArticulos(SyncArticulosRequest) returns (SyncResponse);
  rpc SyncAlmacenes(SyncAlmacenesRequest) returns (SyncResponse);
  rpc SyncUnidades(SyncUnidadesRequest) returns (SyncResponse);
  rpc GetUnidad(GetUnidadRequest) returns (GetUnidadesResponse);
  rpc GetUnidadesPorArticulo(GetUnidadesPorArticuloRequest) returns (GetUnidadesResponse);
  rpc ListUnidades(ListUnidadesRequest) returns (GetUnidadesResponse);
  rpc GetDocumento(GetDocumentoRequest) returns (GetDocumentoResponse);
  rpc ListDocumentos(ListDocumentosRequest) returns (ListDocumentosResponse);
  rpc GetArticulo(GetArticuloRequest) returns (GetArticuloResponse);
  rpc GetArticuloByCodigo(GetArticuloByCodigoRequest) returns (GetArticuloResponse);
  rpc ListArticulos(ListArticulosRequest) returns (ListArticulosResponse);
  rpc GetAlmacen(GetAlmacenRequest) returns (GetAlmacenResponse);
  rpc ListAlmacenes(ListAlmacenesRequest) returns (ListAlmacenesResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc BuscarComprasPorArticulos(BuscarComprasRequest) returns (BuscarComprasResponse);
  rpc BuscarRemisionesPorArticulos(BuscarRemisionesRequest) returns (BuscarRemisionesResponse);
  rpc SyncMultialm(SyncMultialmRequest) returns (SyncResponse);
  rpc GetInventario(GetInventarioRequest) returns (GetInventarioResponse);
  rpc ListInventarioPorArticulo(ListInventarioPorArticuloRequest) returns (ListInventarioPorArticuloResponse);
  rpc ListInventarioPorAlmacen(ListInventarioPorAlmacenRequest) returns (ListInventarioPorAlmacenResponse);
  rpc SyncClientes(SyncClientesRequest) returns (SyncResponse);
  rpc GetCliente(GetClienteRequest) returns (GetClienteResponse);
  rpc ListClientes(ListClientesRequest) returns (ListClientesResponse);
  rpc SyncProveedores(SyncProveedoresRequest) returns (SyncResponse);
  rpc GetProveedor(GetProveedorRequest) returns (GetProveedorResponse);
  rpc ListProveedores(ListProveedoresRequest) returns (ListProveedoresResponse);
  rpc SyncMinv(SyncMinvRequest) returns (SyncResponse);
  rpc SyncConcinv(SyncConcinvRequest) returns (SyncResponse);
  rpc SyncConccxc(SyncConccxcRequest) returns (SyncResponse);
  rpc SyncConccaja(SyncConccajaRequest) returns (SyncResponse);
  rpc SyncCortes(SyncCortesRequest) returns (SyncResponse);
  rpc SyncCaja(SyncCajaRequest) returns (SyncResponse);
  rpc GetCorte(GetCorteRequest) returns (GetCorteResponse);
  rpc ListCortes(ListCortesRequest) returns (ListCortesResponse);
  rpc ListConccaja(ListConccajaRequest) returns (ListConccajaResponse);
  rpc SyncCxc(SyncCxcRequest) returns (SyncResponse);
  rpc GetCxc(GetCxcRequest) returns (GetCxcResponse);
  rpc ListCxc(ListCxcRequest) returns (ListCxcResponse);
  rpc ListMinvPorArticulo(ListMinvPorArticuloRequest) returns (ListMinvPorArticuloResponse);
  rpc GetClienteEstadisticas(GetClienteEstadisticasRequest) returns (GetClienteEstadisticasResponse);
  rpc GetTopArticulosPorCliente(GetTopArticulosPorClienteRequest) returns (GetTopArticulosPorClienteResponse);
  rpc GetEstadisticasGenerales(GetEstadisticasGeneralesRequest) returns (GetEstadisticasGeneralesResponse);
  rpc GetEstadisticasCompras(GetEstadisticasTrimestralesRequest) returns (GetEstadisticasComprasResponse);
  rpc GetEstadisticasVentasContado(GetEstadisticasTrimestralesRequest) returns (GetEstadisticasVentasContadoResponse);
  rpc GetEstadisticasVentasCredito(GetEstadisticasTrimestralesRequest) returns (GetEstadisticasVentasCreditoResponse);
  rpc GetEstadisticasPagosCredito(GetEstadisticasTrimestralesRequest) returns (GetEstadisticasPagosCreditoResponse);
  rpc GetEstadisticasInventario(GetEstadisticasTrimestralesRequest) returns (GetEstadisticasInventarioResponse);
  rpc GetEstadisticasVentasContadoPorTipo(GetEstadisticasTrimestralesRequest) returns (GetEstadisticasVentasContadoPorTipoResponse);
  rpc GetEstadisticasVentasCreditoPorTipo(GetEstadisticasTrimestralesRequest) returns (GetEstadisticasVentasCreditoPorTipoResponse);
}

// ── Sync requests ──────────────────────────────────────────────
message SyncDocumentosRequest {
  repeated DocumentoRecord records = 1;
}
message SyncMovimientosRequest {
  repeated MovimientoRecord records = 1;
}
message SyncArticulosRequest {
  repeated ArticuloRecord records = 1;
}
message SyncAlmacenesRequest {
  repeated AlmacenRecord records = 1;
}
message SyncMultialmRequest {
  repeated MultialmRecord records = 1;
}
message SyncClientesRequest {
  repeated ClienteRecord records = 1;
}
message SyncProveedoresRequest {
  repeated ProveedorRecord records = 1;
}
message SyncMinvRequest {
  repeated MinvRecord records = 1;
}
message SyncConcinvRequest {
  repeated ConcinvRecord records = 1;
}
message SyncConccxcRequest {
  repeated ConccxcRecord records = 1;
}
message SyncConccajaRequest {
  repeated ConccajaRecord records = 1;
}
message SyncCortesRequest {
  repeated CorteRecord records = 1;
}
message SyncCajaRequest {
  repeated CajaRecord records = 1;
}
message SyncCxcRequest {
  repeated CxcRecord records = 1;
}
message SyncUnidadesRequest {
  repeated UnidadRecord records = 1;
}

// ── Sync response (compartido por los tres métodos de sync) ────
message SyncResponse {
  int32 processed = 1;
  repeated SyncError errors = 2;
}

message SyncError {
  string key = 1; // "tipodoc|numdoc" para docs, "tipodoc|numdoc|numpar" para movim, "numart" para artículos
  string message = 2;
}

// ── Query ──────────────────────────────────────────────────────
message GetDocumentoRequest {
  string tipodoc = 1;
  string numdoc = 2;
}
message GetDocumentoResponse {
  DocumentoRecord documento = 1;
  repeated MovimientoRecord movimientos = 2;
}

message ListDocumentosRequest {
  optional string tipodoc = 1;
  optional string fecha_from = 2; // ISO 8601 YYYY-MM-DD
  optional string fecha_to = 3;
  optional int32 status = 4;
  int32 page_size = 5;
  string page_token = 6;
  optional string numalm = 7;
  optional string numcli = 8;
  optional string numprov = 9;
  optional string formapago = 10;
  optional string numdoc = 11; // búsqueda exacta
  optional string fechacapt_from = 12; // ISO 8601 YYYY-MM-DD
  optional string fechacapt_to = 13; // ISO 8601 YYYY-MM-DD
  optional string order_by = 14; // "fechacapt_desc" (default) | "fechacapt_asc" | "id"
}
message ListDocumentosResponse {
  repeated DocumentoRecord documentos = 1;
  string next_page_token = 2;
}

// ── Artículo queries ───────────────────────────────────────────
message GetArticuloRequest {
  string numart = 1;
}
message GetArticuloByCodigoRequest {
  string codigo = 1;
}
message GetArticuloResponse {
  ArticuloRecord articulo = 1;
}

message ListArticulosRequest {
  optional string q = 1; // busca en numart y desc
  optional bool activo = 2;
  int32 page_size = 3;
  string page_token = 4; // cursor: último numart de la página anterior
}
message ListArticulosResponse {
  repeated ArticuloRecord articulos = 1;
  string next_page_token = 2;
}

// ── BuscarComprasPorArticulos ───────────────────────────────────
message BuscarComprasRequest {
  repeated string numarts = 1; // Lista de claves de artículos a buscar
  string fecha_desde = 2; // ISO date "YYYY-MM-DD" (exclusive)
  float umbral_cobertura = 3; // 0.0–1.0; si es 0.0 se usa 0.70 por defecto
}

message CompraMatchItem {
  string tipodoc = 1;
  string numdoc = 2;
  string fecha = 3;
  string numprov = 4;
  double importe = 5;
  int32 status = 6;
  int32 arts_matched = 7;
  int32 total_arts = 8;
  float coverage_pct = 9;
}

message BuscarComprasResponse {
  repeated CompraMatchItem items = 1;
}

// ── BuscarRemisionesPorArticulos ────────────────────────────────
message BuscarRemisionesRequest {
  repeated string numarts = 1; // Lista de claves de artículos a buscar
  string fecha_desde = 2; // ISO date "YYYY-MM-DD" (exclusive)
  float umbral_cobertura = 3; // 0.0–1.0; si es 0.0 se usa 0.70 por defecto
  string numalm = 4; // Clave del almacén/sucursal
}

message RemisionMatchItem {
  string tipodoc = 1;
  string numdoc = 2;
  string fecha = 3;
  string numcli = 4; // cliente (no proveedor)
  double importe = 5;
  int32 status = 6;
  int32 arts_matched = 7;
  int32 total_arts = 8;
  float coverage_pct = 9;
}

message BuscarRemisionesResponse {
  repeated RemisionMatchItem items = 1;
}

// ── Inventario (MULTIALM) queries ──────────────────────────────
message GetInventarioRequest {
  string numart = 1;
  string numalm = 2;
}
message GetInventarioResponse {
  MultialmRecord record = 1;
}

message ListInventarioPorArticuloRequest {
  string numart = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListInventarioPorArticuloResponse {
  repeated MultialmRecord records = 1;
  string next_page_token = 2;
}

message ListInventarioPorAlmacenRequest {
  string numalm = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListInventarioPorAlmacenResponse {
  repeated MultialmRecord records = 1;
  string next_page_token = 2;
}

// ── Proveedor queries ──────────────────────────────────────────
message GetProveedorRequest {
  string numprov = 1;
}
message GetProveedorResponse {
  ProveedorRecord proveedor = 1;
}

message ListProveedoresRequest {
  optional string q = 1; // busca en numprov y nomprov
  int32 page_size = 2;
  string page_token = 3; // cursor: último numprov de la página anterior
}
message ListProveedoresResponse {
  repeated ProveedorRecord proveedores = 1;
  string next_page_token = 2;
}

// ── Cliente queries ────────────────────────────────────────────
message GetClienteRequest {
  string numcli = 1;
}
message GetClienteResponse {
  ClienteRecord cliente = 1;
}

message ListClientesRequest {
  optional string q = 1; // busca en numcli y nomcli
  optional bool suspendido = 2;
  optional string numvend = 3;
  optional string numzona = 4;
  int32 page_size = 5;
  string page_token = 6; // cursor: último numcli de la página anterior
  optional bool tiene_saldo = 7; // true: saldo > 0 / false: saldo = 0 o nulo
  optional bool tiene_limcred = 8; // true: limcred > 0 / false: limcred = 0 o nulo
}
message ListClientesResponse {
  repeated ClienteRecord clientes = 1;
  string next_page_token = 2;
}

// ── Almacén queries ────────────────────────────────────────────
message GetAlmacenRequest {
  string numalm = 1;
}
message GetAlmacenResponse {
  AlmacenRecord almacen = 1;
}

message ListAlmacenesRequest {
  optional string q = 1; // busca en numalm y nomalm
  int32 page_size = 2;
  string page_token = 3; // cursor: último numalm de la página anterior
}
message ListAlmacenesResponse {
  repeated AlmacenRecord almacenes = 1;
  string next_page_token = 2;
}

// ── Health ─────────────────────────────────────────────────────
message HealthCheckRequest {}
message HealthCheckResponse {
  string status = 1;
  string version = 2;
}

// ── Records ────────────────────────────────────────────────────

// DocumentoRecord: campos seleccionados de DOCUM + sync_hash + deleted_in_dbf
// Reserved: 7=divisa, 9=tc, 17=numvend, 18=pedimento, 19=fechaped, 20=aduana,
//           21=indirectos, 26=numuser, 33=fentrega, 34=hentrega, 35=cod,
//           38=cantimpr, 39=numclisuc, 44=idmotivo, 46=numcliev, 47=numfact,
//           49=numcerti, 50=esanticipo, 51=otros
message DocumentoRecord {
  reserved 7, 9, 17, 18, 19, 20, 21, 26, 33, 34, 35, 38, 39, 44, 46, 47, 49, 50, 51;
  string tipodoc = 1;
  string numdoc = 2;
  string numalm = 3;
  string fecha = 4; // ISO 8601 YYYY-MM-DD, vacío = null
  string numcli = 5;
  string numprov = 6;
  string formapago = 8;
  double pjedesc = 10;
  string fechapago = 11; // ISO 8601, vacío = null
  string refer = 12;
  double importe = 13;
  double descuento = 14;
  double impuesto1 = 15;
  double impuesto2 = 16;
  int32 status = 22;
  double costo = 23;
  double costo2 = 24;
  double costopro = 25;
  double descuentog = 27;
  string hora = 28;
  bool factdiaria = 29;
  bool fueticket = 30;
  double retencion1 = 31;
  double retencion2 = 32;
  string fechacapt = 36; // ISO 8601, vacío = null
  string corte = 37;
  double descuento1 = 40;
  double descuento2 = 41;
  double descuento3 = 42;
  double descuento4 = 43;
  string fechacanc = 45; // ISO 8601, vacío = null
  string uuid = 48;
  // Campos de sincronización
  string sync_hash = 52;
  bool deleted_in_dbf = 53;
}

// MovimientoRecord: campos seleccionados de MOVIM + sync_hash + deleted_in_dbf
// Reserved: 8=costopro, 22=lote
message MovimientoRecord {
  reserved 8, 22;
  string tipodoc = 1;
  string numdoc = 2;
  string numpar = 3;
  string numart = 4;
  double precio = 5;
  double costo = 6;
  double costo2 = 7;
  double cant = 9;
  double pend = 10;
  double pendocant = 11;
  double empaque = 12;
  double devueltos = 13;
  double pjedesc = 14;
  double impuesto1 = 15;
  double impuesto2 = 16;
  string unidad = 17;
  string docant = 18;
  double pjedesc2 = 19;
  double pjedesc3 = 20;
  double pjedesc4 = 21;
  double pjedesc1 = 23;
  double promoid = 24;
  double pendcanc = 25;
  // Campos de sincronización
  string sync_hash = 26;
  bool deleted_in_dbf = 27;
}

// ArticuloRecord: campos seleccionados de ARTS + sync_hash + deleted_in_dbf
