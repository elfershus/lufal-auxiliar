  string contacto3 = 28; // C:40
  string telefono2 = 29; // C:50
  string telefono3 = 30; // C:50
  string banco = 31; // C:30
  int32 idregla = 34; // N:5.0
  double impuesto1 = 35; // N:6.2
  string idregimen = 36; // C:3
  // Campos de sincronización
  string sync_hash = 39;
  bool deleted_in_dbf = 40;
}

// ClienteRecord: campos de CLIENTES.DBF + sync_hash + deleted_in_dbf
// Field 41 reserved for claveweb (excluded from sync)
message ClienteRecord {
  reserved 41;
  string numcli = 1; // C:5  - clave primaria
