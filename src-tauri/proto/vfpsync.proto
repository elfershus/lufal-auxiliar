// MinvRecord: campos de MINV.DBF — kardex de entradas y salidas de inventario
// PK: tipodoc + numdoc + numpar (igual que MOVIMIENTOS)
// cant es con signo: positivo = entrada, negativo = salida
message MinvRecord {
  string tipodoc = 1; // C:2  — PK parte 1
  string numdoc = 2; // C:10 — PK parte 2
  string numpar = 3; // C:3  — PK parte 3
  string numart = 4; // C:20
  string fecha = 5; // D:8  ISO 8601 YYYY-MM-DD, vacío = null
  string numalm = 6; // C:2
  double cant = 7; // N:12.3 — con signo: positivo=entrada, negativo=salida
  double disp = 8; // N:12.3
  double precio = 9; // N:13.5
  double costo = 10; // N:13.5
  double costodls = 11; // N:13.5
  double costo2 = 12; // N:13.5
  double costopro = 13; // N:13.5
  string numprov = 14; // C:5
  string numcli = 15; // C:5
  string numuser = 16; // C:5
  string caducidad = 17; // D:8  ISO 8601 YYYY-MM-DD, vacío = null
  string lote = 18; // C:20
  string refer = 19; // C:10
  double cantimpr = 20; // N:3.0
  string idmotivo = 21; // C:3
  string fechahora = 22; // C:14 — raw "YYYYMMDDHHMMSS"
  // Campos de sincronización
  string sync_hash = 23;
  bool deleted_in_dbf = 24;
}

// ConcinvRecord: conceptos de inventario — catálogo de tipodoc para MINV
// PK: conc (C:2) — mismo código que tipodoc en MINV
message ConcinvRecord {
  string conc = 1; // C:2  — PK (mismo que tipodoc en MINV)
  string desc = 2; // C:30 — descripción del concepto
  string es = 3; // C:1
  string cop = 4; // C:1
  string formato = 5; // C:8
  string niveles = 6; // C:30
  string conccanc = 7; // C:2  — concepto de cancelación relacionado
  string sigfolio = 8; // C:10
  // Campos de sincronización
  string sync_hash = 9;
  bool deleted_in_dbf = 10;
}

// ConccxcRecord: catálogo de conceptos de CXC (ConCxc.DBF)
// PK: conc (C:2)
message ConccxcRecord {
  string conc = 1; // C:2  — PK
  string desc = 2; // C:20
  string ca = 3; // C:1  "1"=cargo, "0"=abono
  bool obligaref = 4; // L:1
  bool editar = 5; // L:1
  string reporte = 6; // C:60
  string sigfolio = 7; // C:10
  bool repetido = 8; // L:1
  string clavesat = 9; // C:2
  bool obligfolio = 10; // L:1
  // Campos de sincronización
  string sync_hash = 11;
  bool deleted_in_dbf = 12;
}

// CxcRecord: cuentas por cobrar (Cxc.DBF)
// PK: keycxc (C:12)
message CxcRecord {
  string keycxc = 1; // C:12 — PK
  string numcli = 2; // C:5
  string conc = 3; // C:2  → conccxc.conc
  string numdoc = 4; // C:10
  string refer = 5; // C:12
  string fecha = 6; // D:8  ISO 8601, vacío = null
  string venc = 7; // D:8  ISO 8601, vacío = null
  double importe = 8; // N:12.2
  double tc = 9; // N:8.4
  string divisa = 10; // C:1
  double saldo = 11; // N:12.2
  string ca = 12; // C:1  "1"=cargo, "0"=abono
  bool entregada = 13; // L:1
  bool obligaref = 14; // L:1
  int64 recno = 15; // N:8.0
  string numuser = 16; // C:5
  string numalm = 17; // C:2
  string keyrefer = 18; // C:12
  string keyrefer2 = 19; // C:12
  string keydocum = 20; // C:12
  string keycaja = 21; // C:12
  string fechahora = 22; // C:14 raw "YYYYMMDDHHMMSS"
  string cvecuenta = 23; // C:2
  string idctaorig = 24; // C:9
  string idspei = 25; // C:9
  string pagodigrel = 26; // C:10
  // Campos de sincronización
  string sync_hash = 27;
  bool deleted_in_dbf = 28;
}

// GetCxcRequest / GetCxcResponse
message GetCxcRequest {
  string keycxc = 1;
}
message GetCxcResponse {
  CxcRecord record = 1;
}

// ListCxcRequest / ListCxcResponse
message ListCxcRequest {
  string numcli = 1; // filtro opcional por cliente
  string numalm = 2; // filtro opcional por almacén
  string keycxc = 3; // filtro opcional por keycxc exacto
  string fecha_desde = 4; // ISO 8601 fecha inicio
  string fecha_hasta = 5; // ISO 8601 fecha fin
  bool only_with_saldo = 6; // solo registros con saldo != 0
  string page_token = 7; // cursor de paginación (último keycxc visto)
  int32 page_size = 8;
  string sort_dir = 9; // "desc" = más recientes primero (default), "asc" = más antiguos primero
}
message ListCxcResponse {
  repeated CxcRecord records = 1;
  string next_page_token = 2;
}

// AlmacenRecord: campos de ALMACEN.DBF + sync_hash + deleted_in_dbf
// ── ListMinvPorArticulo ────────────────────────────────────────────────────────
message ListMinvPorArticuloRequest {
  string numart = 1; // requerido — clave del artículo
  optional string numalm = 2; // filtro por almacén; vacío = todos
  optional string fecha_from = 3; // ISO 8601 YYYY-MM-DD, inclusivo
  optional string fecha_to = 4; // ISO 8601 YYYY-MM-DD, inclusivo
  optional string tipodoc = 5; // filtro por tipo de documento
  int32 page_size = 6; // default 50, max 200
  string page_token = 7; // cursor opaco; vacío = primera página
  optional string sort_dir = 8; // "asc" | "desc" (default)
}

message ListMinvPorArticuloResponse {
  repeated MinvRecord records = 1;
  string next_page_token = 2;
}

// ── GetClienteEstadisticas ────────────────────────────────────────────────────
message GetClienteEstadisticasRequest {
  string numcli = 1; // C:5 — requerido
  string mes_desde = 2; // YYYY-MM — default: mes_hasta - 5 meses (6 meses total)
  string mes_hasta = 3; // YYYY-MM — default: mes actual del servidor
}

message ClienteMesStats {
  string mes = 1; // YYYY-MM
  int32 ventas_count = 2;
  double ventas_total = 3;
  double ventas_contado = 4;
  double ventas_credito = 5;
  double cargos_cxc = 6; // SUM(importe) WHERE ca='0'
  double abonos_cxc = 7; // SUM(importe) WHERE ca='1'
  double saldo_inicio = 8;
  double saldo_fin = 9;
}

message GetClienteEstadisticasResponse {
  repeated ClienteMesStats meses = 1; // ordenados de más antiguo a más reciente
}

// ── GetTopArticulosPorCliente ──────────────────────────────────────────────
message GetTopArticulosPorClienteRequest {
  string numcli = 1; // requerido
  repeated string tipodocs = 2; // e.g. ["FA","RE","VT"]
  int32 top_n = 3; // default 10, max 50
}

message TopArticuloClienteItem {
  string numart = 1;
  string desc = 2;
  double total_cant = 3;
  int32 num_documentos = 4;
}

message GetTopArticulosPorClienteResponse {
  repeated TopArticuloClienteItem items = 1;
}

message AlmacenRecord {
  string numalm = 1; // C:2  - clave primaria
  string nomalm = 2; // C:30 - nombre del almacén
  string niveles = 3; // C:50
  string ultid = 4; // C:14
  string ultss = 5; // C:10
  bool salxcapa = 6; // L:1
  bool obligacad = 7; // L:1
  bool obligalot = 8; // L:1
  string numalmprim = 9; // C:2  - almacén padre (referencia blanda)
  string calle = 10; // C:50
  string numext = 11; // C:15
  string colonia = 12; // C:30
  string ciudad = 13; // C:50
  string estado = 14; // C:50
  string cp = 15; // C:50
  // Campos de sincronización
  string sync_hash = 16;
  bool deleted_in_dbf = 17;
}

// UnidadRecord: unidades alternativas de venta por artículo (Unidades.DBF)
// PK: numart + unidad (composite)
// Equivalencia = equiv2 / equiv1
message UnidadRecord {
  string numart = 1; // C:20 — PK parte 1, referencia blanda a articulos.numart
  string unidad = 2; // C:5  — PK parte 2, código de unidad alternativa
  double equiv1 = 3; // N:10.3 — denominador de la equivalencia
  double equiv2 = 4; // N:10.3 — numerador de la equivalencia
  double precio1 = 5; // N:13.5
  double precio2 = 6; // N:13.5
  double precio3 = 7; // N:13.5
  double precio4 = 8; // N:13.5
  double precio5 = 9; // N:13.5
  double preciopub = 10; // N:10.2
  // Campos de sincronización
  string sync_hash = 11;
  bool deleted_in_dbf = 12;
}

// ── Unidades queries ───────────────────────────────────────────────────────────
message GetUnidadRequest {
  string numart = 1;
  string unidad = 2;
}

message GetUnidadesPorArticuloRequest {
  string numart = 1;
}

message ListUnidadesRequest {
  optional string numart = 1; // filtro por numart exacto o prefijo
  int32 page_size = 2;
  string page_token = 3; // cursor: último "numart|unidad" visto
}

message GetUnidadesResponse {
  repeated UnidadRecord records = 1;
  string next_page_token = 2; // vacío si no hay más páginas
}

// ── GetEstadisticasGenerales ──────────────────────────────────────────────────
message GetEstadisticasGeneralesRequest {}

message GetEstadisticasGeneralesResponse {
  int64 num_articulos = 1; // artículos activos (deleted_in_dbf = false)
  int64 num_clientes = 2; // clientes activos (deleted_in_dbf = false)
  int64 num_proveedores = 3; // proveedores activos (deleted_in_dbf = false)
  int64 num_fracciones = 4; // unidades alternativas activas (deleted_in_dbf = false)
  int64 num_cuentas_x_cobrar = 5; // CXC con saldo != 0
  int64 num_sucursales = 6; // almacenes activos (deleted_in_dbf = false)
}

// ── Cortes queries ────────────────────────────────────────────────────────────

message GetCorteRequest {
  string corte = 1; // C:7 — PK requerida
}

message GetCorteResponse {
  CorteRecord corte = 1;
  repeated CajaRecord partidas = 2; // movimientos del corte
}

message ListCortesRequest {
  optional string numalm = 1; // filtro por almacén exacto
  optional string fecha_from = 2; // ISO 8601 YYYY-MM-DD, inclusivo
  optional string fecha_to = 3; // ISO 8601 YYYY-MM-DD, inclusivo
  optional string corte = 4; // folio exacto (C:7)
  optional string estado = 5; // "abierto" (sin fechafin) | "cerrado" (con fechafin)
  int32 page_size = 6; // default 50
  string page_token = 7; // cursor: último corte visto
  optional string sort_dir = 8; // "desc" = más recientes primero (default) | "asc"
  bool complete_days = 9; // Si true, extiende la página para no partir un día entre páginas
}

message ListCortesResponse {
  repeated CorteRecord cortes = 1;
  string next_page_token = 2;
}

message ListConccajaRequest {} // sin filtros — catálogo completo

message ListConccajaResponse {
  repeated ConccajaRecord records = 1;
}

