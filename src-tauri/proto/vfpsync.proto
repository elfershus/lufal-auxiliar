// ── Estadísticas trimestrales ─────────────────────────────────────────────────

message GetEstadisticasTrimestralesRequest {
  optional string numalm = 1; // vacío = todos los almacenes
}

message EstadisticaAlmacenItem {
  string numalm = 1;
  string nomalm = 2;
  double importe = 3;
}

message EstadisticasTrimestreItem {
  string trimestre = 1; // "YYYY-QN" ej: "2025-Q4"
  string fecha_inicio = 2; // ISO 8601 YYYY-MM-DD
  string fecha_fin = 3; // ISO 8601 YYYY-MM-DD
  bool es_actual = 4; // true si es el trimestre en curso
  repeated EstadisticaAlmacenItem almacenes = 5;
}

message GetEstadisticasComprasResponse {
  repeated EstadisticasTrimestreItem trimestres = 1;
}

message GetEstadisticasVentasContadoResponse {
  repeated EstadisticasTrimestreItem trimestres = 1;
}

message GetEstadisticasVentasCreditoResponse {
  repeated EstadisticasTrimestreItem trimestres = 1;
}

message GetEstadisticasPagosCreditoResponse {
  repeated EstadisticasTrimestreItem trimestres = 1;
}

message EstadisticaInventarioAlmacenItem {
  string numalm = 1;
  string nomalm = 2;
  double saldo_inicial = 3; // SUM(cant*costo) acumulado antes del trimestre
  double movimiento = 4; // SUM(cant*costo) dentro del trimestre
  double saldo_final = 5; // saldo_inicial + movimiento
}

message EstadisticasInventarioTrimestreItem {
  string trimestre = 1; // "YYYY-QN"
  string fecha_inicio = 2; // ISO 8601 YYYY-MM-DD
  string fecha_fin = 3; // ISO 8601 YYYY-MM-DD
  bool es_actual = 4;
  repeated EstadisticaInventarioAlmacenItem almacenes = 5;
}

message GetEstadisticasInventarioResponse {
  repeated EstadisticasInventarioTrimestreItem trimestres = 1;
}

// ── Ventas por tipo de documento ──────────────────────────────────────────────

message EstadisticaVentasTipoDocItem {
  string tipodoc = 1; // "R", "N" o "F"
  repeated EstadisticaAlmacenItem almacenes = 2;
}

message EstadisticasVentasPorTipoTrimestreItem {
  string trimestre = 1; // "YYYY-QN"
  string fecha_inicio = 2;
  string fecha_fin = 3;
  bool es_actual = 4;
  repeated EstadisticaVentasTipoDocItem tipos = 5;
}

message GetEstadisticasVentasContadoPorTipoResponse {
  repeated EstadisticasVentasPorTipoTrimestreItem trimestres = 1;
}

message GetEstadisticasVentasCreditoPorTipoResponse {
  repeated EstadisticasVentasPorTipoTrimestreItem trimestres = 1;
}
